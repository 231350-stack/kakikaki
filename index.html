<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>kakikaki</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;}
html{height:100%;height:-webkit-fill-available;}
body{width:100%;height:100%;height:100dvh;background:#fff;overflow:hidden;overscroll-behavior:none;}
#wrap{
  position:fixed;
  inset:0;
  width:100%;height:100%;
  background:#fff;overflow:hidden;
}
#c-bg  {position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}
#c-draw{position:absolute;inset:0;width:100%;height:100%;z-index:1;}
#c-life{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;}

#panel{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  display:flex;gap:16px;align-items:flex-end;
  z-index:10;pointer-events:all;
}
.shape-btn{
  cursor:pointer;
  border:3px solid rgba(255,255,255,.75);
  box-shadow:0 4px 14px rgba(0,0,0,.22);
  transition:transform .15s, box-shadow .15s;
  -webkit-tap-highlight-color:transparent;
  flex-shrink:0;
}
.shape-btn:hover{transform:scale(1.2);box-shadow:0 6px 20px rgba(0,0,0,.3);}
.shape-btn.pop{animation:btn-pop .32s ease both;}
.shape-btn.selected{outline:4px solid rgba(255,255,255,0.95);outline-offset:3px;box-shadow:0 0 0 2px rgba(0,0,0,0.18), 0 6px 22px rgba(0,0,0,.32);}
@keyframes btn-pop{
  0%  {transform:scale(1);}
  40% {transform:scale(1.38) rotate(10deg);}
  70% {transform:scale(.88) rotate(-5deg);}
  100%{transform:scale(1);}
}

/* モードボタン */
#modes{
  position:absolute;bottom:82px;left:50%;transform:translateX(-50%);
  display:flex;gap:16px;z-index:10;pointer-events:all;
}
.mBtn{
  width:60px;height:60px;border-radius:50%;border:none;
  background:rgba(255,255,255,.92);cursor:pointer;
  box-shadow:0 3px 12px rgba(0,0,0,.18);
  transition:transform .18s,box-shadow .18s;
  -webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;justify-content:center;
}
.mBtn:hover{transform:scale(1.12);background:#fff;box-shadow:0 5px 18px rgba(0,0,0,.24);}
.mBtn.active{transform:scale(1.14);background:#fff;box-shadow:0 0 0 4px #fff,0 4px 16px rgba(0,0,0,.22);}

/* 保存ボタン */
#btn-save{
  position:absolute;bottom:20px;right:20px;
  width:56px;height:56px;border-radius:50%;border:none;
  background:rgba(255,255,255,.92);cursor:pointer;
  box-shadow:0 2px 14px rgba(0,0,0,.2);
  display:flex;align-items:center;justify-content:center;
  z-index:10;transition:transform .18s,box-shadow .18s;
  -webkit-tap-highlight-color:transparent;
}
#btn-save:hover{transform:scale(1.12);box-shadow:0 4px 20px rgba(0,0,0,.28);}
#btn-save:active{transform:scale(.94);}

/* ギャラリーボタン */
#btn-gallery{
  position:absolute;top:12px;left:14px;
  width:38px;height:38px;border-radius:50%;border:none;
  background:rgba(255,255,255,.85);cursor:pointer;font-size:17px;
  box-shadow:0 2px 8px rgba(0,0,0,.13);
  transition:transform .18s,background .18s,box-shadow .18s;
  z-index:10;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
#btn-gallery:hover{transform:scale(1.15);background:#fff;}

/* 全画面ボタン（右上） */
#btn-fullscreen{
  position:absolute;top:12px;right:14px;
  width:38px;height:38px;border-radius:50%;border:none;
  background:rgba(255,255,255,.85);cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.13);
  transition:transform .18s,background .18s,box-shadow .18s;
  z-index:10;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
#btn-fullscreen:hover{transform:scale(1.15);background:#fff;}
#btn-fullscreen:active{transform:scale(.92);}

/* 保存フラッシュ */
#save-flash{
  position:absolute;inset:0;pointer-events:none;z-index:20;
  background:rgba(255,255,255,0);transition:background .08s;
}
#save-flash.on{background:rgba(255,255,255,.55);}

/* 保存完了トースト */
#save-toast{
  position:absolute;top:60px;left:50%;transform:translateX(-50%) translateY(-12px);
  background:rgba(30,30,30,.82);color:#fff;
  font-family:sans-serif;font-size:13px;letter-spacing:.04em;
  padding:7px 18px;border-radius:20px;pointer-events:none;
  z-index:25;opacity:0;transition:opacity .25s,transform .25s;
  white-space:nowrap;
}
#save-toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ギャラリーオーバーレイ */
#gallery-overlay{
  position:absolute;inset:0;
  background:rgba(16,16,26,.94);
  z-index:30;display:none;flex-direction:column;overflow:hidden;
}
#gallery-overlay.open{display:flex;}
#gallery-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 10px;
  border-bottom:1px solid rgba(255,255,255,.1);flex-shrink:0;
}
#gallery-title{
  color:#fff;font-size:15px;font-weight:bold;
  font-family:sans-serif;letter-spacing:.05em;
}
#gallery-close{
  width:32px;height:32px;border-radius:50%;border:none;
  background:rgba(255,255,255,.14);color:#fff;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;-webkit-tap-highlight-color:transparent;line-height:1;
}
#gallery-close:hover{background:rgba(255,255,255,.26);}
#gallery-body{flex:1;overflow-y:auto;padding:14px;}
#gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}
#gallery-empty{
  color:rgba(255,255,255,.35);text-align:center;
  font-family:sans-serif;font-size:13px;padding:48px 0;display:none;
}
.g-card{
  border-radius:9px;overflow:hidden;
  background:rgba(255,255,255,.07);cursor:pointer;
  position:relative;transition:transform .15s,box-shadow .15s;
  aspect-ratio:16/9;
}
.g-card:hover{transform:scale(1.04);box-shadow:0 4px 22px rgba(0,0,0,.45);}
.g-card img{width:100%;height:100%;object-fit:cover;display:block;}
.g-label{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.68));
  color:#fff;font-family:sans-serif;font-size:10px;
  padding:14px 7px 5px;letter-spacing:.02em;
}
.g-del{
  position:absolute;top:5px;right:5px;
  width:22px;height:22px;border-radius:50%;border:none;
  background:rgba(0,0,0,.6);color:#fff;font-size:13px;
  cursor:pointer;display:none;align-items:center;justify-content:center;
  z-index:2;line-height:1;-webkit-tap-highlight-color:transparent;
}
.g-card:hover .g-del{display:flex;}

/* アイテムビューア */
#item-viewer{
  position:absolute;inset:0;background:rgba(0,0,0,.9);
  z-index:40;display:none;flex-direction:column;
  align-items:center;justify-content:center;
}
#item-viewer.open{display:flex;}
#item-viewer img{
  max-width:88%;max-height:75%;border-radius:10px;
  box-shadow:0 8px 48px rgba(0,0,0,.6);object-fit:contain;
}
#item-label{
  color:rgba(255,255,255,.55);font-family:sans-serif;
  font-size:12px;margin-top:12px;letter-spacing:.04em;
}
#item-actions{display:flex;gap:10px;margin-top:14px;}
.i-btn{
  padding:7px 22px;border-radius:20px;border:none;cursor:pointer;
  font-family:sans-serif;font-size:13px;
  transition:opacity .15s;-webkit-tap-highlight-color:transparent;
}
.i-btn:hover{opacity:.78;}
#item-close-btn{background:rgba(255,255,255,.18);color:#fff;}
#item-del-btn{background:rgba(210,45,45,.85);color:#fff;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c-bg"></canvas>
  <canvas id="c-draw"></canvas>
  <canvas id="c-life"></canvas>
  <div id="modes">
    <!-- 生き物モード -->
    <button class="mBtn active" data-mode="0" title="生き物">
      <svg viewBox="0 0 32 32" width="30" height="30" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="8"  cy="11" rx="5.5" ry="6"   fill="#5bc8f5"/>
        <ellipse cx="24" cy="11" rx="5.5" ry="6"   fill="#5bc8f5"/>
        <ellipse cx="8"  cy="11.5" rx="3" ry="3.5" fill="#ffadd6"/>
        <ellipse cx="24" cy="11.5" rx="3" ry="3.5" fill="#ffadd6"/>
        <ellipse cx="16" cy="20" rx="13" ry="11"   fill="#5bc8f5"/>
        <circle  cx="11.5" cy="19" r="4"   fill="white"/>
        <circle  cx="20.5" cy="19" r="4"   fill="white"/>
        <circle  cx="12.2" cy="19.5" r="2.4" fill="#1a1a2e"/>
        <circle  cx="21.2" cy="19.5" r="2.4" fill="#1a1a2e"/>
        <circle  cx="13"   cy="18.2" r="1"   fill="white"/>
        <circle  cx="22"   cy="18.2" r="1"   fill="white"/>
        <ellipse cx="7"  cy="23.5" rx="3.2" ry="1.8" fill="#ffadd6" opacity="0.65"/>
        <ellipse cx="25" cy="23.5" rx="3.2" ry="1.8" fill="#ffadd6" opacity="0.65"/>
      </svg>
    </button>
    <!-- 植物モード -->
    <button class="mBtn" data-mode="1" title="植物">
      <svg viewBox="0 0 32 32" width="30" height="30" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="16" cy="7" rx="4.5" ry="6.5" fill="#ff9ed2"/>
        <ellipse cx="16" cy="7" rx="4.5" ry="6.5" fill="#ffb766" transform="rotate(60 16 16)"/>
        <ellipse cx="16" cy="7" rx="4.5" ry="6.5" fill="#ff9ed2" transform="rotate(120 16 16)"/>
        <ellipse cx="16" cy="7" rx="4.5" ry="6.5" fill="#ffb766" transform="rotate(180 16 16)"/>
        <ellipse cx="16" cy="7" rx="4.5" ry="6.5" fill="#ff9ed2" transform="rotate(240 16 16)"/>
        <ellipse cx="16" cy="7" rx="4.5" ry="6.5" fill="#ffb766" transform="rotate(300 16 16)"/>
        <circle cx="16" cy="16" r="7"   fill="#ffe44d"/>
        <circle cx="16" cy="16" r="5.5" fill="#ffd500"/>
        <circle cx="13.5" cy="14.8" r="1.4" fill="#5a3500"/>
        <circle cx="18.5" cy="14.8" r="1.4" fill="#5a3500"/>
        <path d="M13 17.8 Q16 21 19 17.8" stroke="#5a3500" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      </svg>
    </button>
    <!-- 音モード -->
    <button class="mBtn" data-mode="2" title="音">
      <svg viewBox="0 0 34 32" width="30" height="30" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="9.5" cy="26" rx="7" ry="5" fill="#c084fc"/>
        <rect x="16" y="6" width="3.5" height="20.5" rx="1.8" fill="#c084fc"/>
        <path d="M19.5 6.5 C23 7.5 30 12 28 20" stroke="#c084fc" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <circle cx="28" cy="5"  r="2.5" fill="#fbbf24"/>
        <circle cx="32" cy="13" r="1.8" fill="#f472b6"/>
        <circle cx="25" cy="2"  r="1.8" fill="#93c5fd"/>
      </svg>
    </button>
    <!-- 光モード -->
    <button class="mBtn" data-mode="3" title="光">
      <svg viewBox="0 0 32 32" width="30" height="30" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 中心の光の玉 -->
        <circle cx="16" cy="16" r="5" fill="#fff" opacity="0.95"/>
        <circle cx="16" cy="16" r="7" fill="#ffe066" opacity="0.45"/>
        <circle cx="16" cy="16" r="9" fill="#ff9de2" opacity="0.22"/>
        <!-- 光の軌跡ライン -->
        <path d="M4 10 Q10 8 16 16 Q22 24 28 22" stroke="#ffe066" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.9"/>
        <path d="M4 10 Q10 8 16 16 Q22 24 28 22" stroke="#fff" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.7"/>
        <!-- 周囲の小さな光の粒 -->
        <circle cx="6"  cy="7"  r="1.5" fill="#7dd3fc" opacity="0.9"/>
        <circle cx="27" cy="8"  r="1.2" fill="#f0abfc" opacity="0.9"/>
        <circle cx="28" cy="25" r="1.4" fill="#86efac" opacity="0.9"/>
        <circle cx="5"  cy="26" r="1.1" fill="#fde68a" opacity="0.9"/>
        <circle cx="16" cy="3"  r="1.0" fill="#fff"    opacity="0.8"/>
        <circle cx="16" cy="29" r="1.0" fill="#fff"    opacity="0.8"/>
      </svg>
    </button>
  </div>
  <div id="panel"></div>

  <!-- ギャラリーボタン（左上） -->
  <button id="btn-gallery" title="ギャラリー">
    <svg viewBox="0 0 22 22" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="8" height="8" rx="1.5" stroke="#555" stroke-width="1.8"/>
      <rect x="12" y="2" width="8" height="8" rx="1.5" stroke="#555" stroke-width="1.8"/>
      <rect x="2" y="12" width="8" height="8" rx="1.5" stroke="#555" stroke-width="1.8"/>
      <rect x="12" y="12" width="8" height="8" rx="1.5" stroke="#555" stroke-width="1.8"/>
    </svg>
  </button>

  <!-- 保存ボタン（右下） -->
  <button id="btn-save" title="試し書きを記録する">
    <svg viewBox="0 0 26 22" width="26" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M25 18a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h3.5L8 3h10l1.5 3H23a2 2 0 012 2z" stroke="#444" stroke-width="1.8" stroke-linejoin="round"/>
      <circle cx="13" cy="13" r="3.5" stroke="#444" stroke-width="1.8"/>
      <circle cx="21" cy="8" r="1" fill="#888"/>
    </svg>
  </button>

  <!-- 全画面ボタン（右上・プロジェクター用） -->
  <button id="btn-fullscreen" title="全画面">
    <svg id="fs-icon-expand" viewBox="0 0 22 22" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polyline points="14,2 20,2 20,8" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="8,20 2,20 2,14"  stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="20" y1="2"  x2="13" y2="9"  stroke="#555" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="2"  y1="20" x2="9"  y2="13" stroke="#555" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <svg id="fs-icon-compress" viewBox="0 0 22 22" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
      <polyline points="20,8 14,8 14,2"  stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="2,14 8,14 8,20"  stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="14" y1="8"  x2="21" y2="1"  stroke="#555" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="8"  y1="14" x2="1"  y2="21" stroke="#555" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- 保存フラッシュ -->
  <div id="save-flash"></div>
  <!-- 保存完了トースト -->
  <div id="save-toast">記録しました ✓</div>

  <!-- ギャラリーオーバーレイ -->
  <div id="gallery-overlay">
    <div id="gallery-header">
      <span id="gallery-title">試し書きギャラリー</span>
      <button id="gallery-close">✕</button>
    </div>
    <div id="gallery-body">
      <div id="gallery-grid"></div>
      <div id="gallery-empty">まだ保存された試し書きはありません</div>
    </div>
  </div>

  <!-- アイテムビューア -->
  <div id="item-viewer">
    <img id="item-img" src="" alt="試し書き">
    <div id="item-label"></div>
    <div id="item-actions">
      <button class="i-btn" id="item-close-btn">とじる</button>
      <button class="i-btn" id="item-del-btn">削除する</button>
    </div>
  </div>
</div>
<script>
var mode = 0;

// ── キャンバス ─────────────────────────────────
const wrap  = document.getElementById('wrap');
const cBg   = document.getElementById('c-bg');
const cDraw = document.getElementById('c-draw');
const cLife = document.getElementById('c-life');
const ctxBg = cBg.getContext('2d');
const ctxD  = cDraw.getContext('2d');
const ctxL  = cLife.getContext('2d');
let W, H;

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2); // 高解像度対応（最大2倍）
  W = window.innerWidth;
  H = window.innerHeight;
  [cBg, cDraw, cLife].forEach(c => {
    c.width  = W * dpr;
    c.height = H * dpr;
    c.style.width  = W + 'px';
    c.style.height = H + 'px';
    const ctx = c.getContext('2d');
    ctx.scale(dpr, dpr);
  });
}
resize();
window.addEventListener('resize', () => { setTimeout(resize, 100); });
window.addEventListener('orientationchange', () => { setTimeout(resize, 300); });

// ── ツール ─────────────────────────────────────
const TOOLS = [
  {
    id: 'crayon',
    colors: ['#FF2D78','#FF6B00','#FFE600','#00C853','#00B0FF','#AA00FF'],
    lw: () => 9 + Math.random() * 4, op: () => .72 + Math.random() * .16,
    draw(ctx, a, b, c) {
      ctx.save(); ctx.strokeStyle = c; ctx.lineWidth = this.lw();
      ctx.lineCap = 'round'; ctx.globalAlpha = this.op();
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      ctx.globalAlpha = .12; ctx.lineWidth *= 1.5;
      ctx.beginPath(); ctx.moveTo(a.x+R(2), a.y+R(2)); ctx.lineTo(b.x+R(2), b.y+R(2)); ctx.stroke();
      ctx.restore();
    },
    svg: `<svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
      <rect x="20" y="7" width="12" height="29" rx="3" fill="#FF6B00" stroke="#222" stroke-width="1.8"/>
      <polygon points="26,38 20,46 32,46" fill="#FF6B00" stroke="#222" stroke-width="1.8"/>
      <rect x="20" y="7" width="12" height="8" rx="2" fill="#fff9" stroke="#222" stroke-width="1"/>
      <line x1="20" y1="19" x2="32" y2="19" stroke="#2223" stroke-width="1.2"/></svg>`
  },
  {
    id: 'marker',
    colors: ['#FF1744','#FF6D00','#FFD600','#00E676','#2979FF','#D500F9'],
    lw: () => 5, op: () => .9,
    draw(ctx, a, b, c) {
      ctx.save(); ctx.strokeStyle = c; ctx.lineWidth = 5;
      ctx.lineCap = 'round'; ctx.globalAlpha = .9;
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke(); ctx.restore();
    },
    svg: `<svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
      <rect x="21" y="5" width="10" height="28" rx="5" fill="#2979FF" stroke="#222" stroke-width="1.8"/>
      <rect x="21" y="5" width="10" height="10" rx="4" fill="#eee" stroke="#222" stroke-width="1"/>
      <polygon points="26,33 22,43 30,43" fill="#2979FF" stroke="#222" stroke-width="1.8"/>
      <ellipse cx="26" cy="44" rx="3" ry="2" fill="#111"/></svg>`
  },
  {
    id: 'pencil',
    colors: ['#212121','#795548','#546E7A','#E53935','#1565C0','#2E7D32'],
    lw: () => 2 + Math.random() * 1.5, op: () => .55 + Math.random() * .3,
    draw(ctx, a, b, c) {
      ctx.save(); ctx.strokeStyle = c; ctx.lineWidth = 2 + Math.random() * 1.5;
      ctx.lineCap = 'round'; ctx.globalAlpha = .55 + Math.random() * .3;
      ctx.beginPath(); ctx.moveTo(a.x+R(1), a.y+R(1)); ctx.lineTo(b.x+R(1), b.y+R(1)); ctx.stroke(); ctx.restore();
    },
    svg: `<svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
      <rect x="22" y="5" width="8" height="27" rx="2" fill="#FFE082" stroke="#222" stroke-width="1.8"/>
      <rect x="22" y="5" width="8" height="8" rx="2" fill="#FFCA28" stroke="#222" stroke-width="1"/>
      <polygon points="26,32 22,42 30,42" fill="#FFCA28" stroke="#222" stroke-width="1.8"/>
      <polygon points="26,40 23.5,45 28.5,45" fill="#BDBDBD"/>
      <polygon points="26,44 25,47 27,47" fill="#222"/></svg>`
  },
  {
    id: 'brush',
    lw: () => 14 + Math.random() * 10, op: () => .28 + Math.random() * .28,
    draw(ctx, a, b, c) {
      ctx.save(); ctx.strokeStyle = c; ctx.lineWidth = this.lw();
      ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.globalAlpha = this.op();
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      // にじみ層（毛先のかすれ感）
      ctx.globalAlpha = .055; ctx.lineWidth *= 2.2;
      ctx.beginPath(); ctx.moveTo(a.x+R(3), a.y+R(3)); ctx.lineTo(b.x+R(3), b.y+R(3)); ctx.stroke();
      ctx.restore();
    },
  },
  {
    id: 'ballpoint',
    lw: () => 1.2 + Math.random() * .8, op: () => .88 + Math.random() * .10,
    draw(ctx, a, b, c) {
      ctx.save(); ctx.strokeStyle = c; ctx.lineWidth = 1.2 + Math.random() * .8;
      ctx.lineCap = 'round'; ctx.globalAlpha = .88 + Math.random() * .10;
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke(); ctx.restore();
    },
  },
];

function R(n) { return (Math.random() - .5) * n * 2; }
let curTool = TOOLS[0], curColor = TOOLS[0].colors[0];

// 全ツールのカラーをまとめたプール
const ALL_COLORS = TOOLS.flatMap(t => t.colors);

// カラフルな形ボタンの定義（色・形・サイズ）

// ── 入力 ───────────────────────────────────────
let drawing = false, pts = [], lastPt = null;
let strokes = [], currentStroke = null;

// スクロール・引っ張り防止
document.addEventListener('touchstart',  e => e.preventDefault(), { passive: false });
document.addEventListener('touchmove',   e => e.preventDefault(), { passive: false });
document.addEventListener('touchend',    e => e.preventDefault(), { passive: false });

function getP(e) {
  // clientX/Y をそのまま使う（fixedレイアウトなのでオフセット不要）
  const s = e.touches ? e.touches[0] : e;
  return { x: s.clientX, y: s.clientY };
}
function isUI(e) { return e.target.closest('#panel') || e.target.closest('#modes') || e.target.closest('#btn-save') || e.target.closest('#btn-gallery'); }

cDraw.addEventListener('pointerdown', ev => {
  if (isUI(ev)) return;
  drawing = true;
  curTool = TOOLS[Math.floor(Math.random() * TOOLS.length)];
  const p = getP(ev); pts = [p]; lastPt = p;
  currentStroke = { pts: [{ ...p }], col: curColor };
  if (mode === 3) initLightStroke(p);
  cDraw.setPointerCapture(ev.pointerId);
});
cDraw.addEventListener('pointermove', ev => {
  if (!drawing) return; const p = getP(ev); pts.push(p);
  if (pts.length >= 2) {
    const prev = pts[pts.length - 2];
    if (mode !== 3) curTool.draw(ctxD, prev, p, curColor);
    if (currentStroke) currentStroke.pts.push({ ...p });
    if (mode === 1) spawnPlantSeg(p, prev);
    if (mode === 2) spawnSoundWave(p);
    if (mode === 3) spawnLightTrail(p, prev);
  }
  lastPt = p;
});
cDraw.addEventListener('pointerup', ev => {
  if (!drawing) return; drawing = false;
  if (currentStroke && currentStroke.pts.length > 1) {
    strokes.push(currentStroke); if (strokes.length > 40) strokes.shift();
  }
  if (mode === 3) finalizeLightStroke();
  currentStroke = null;
  if (mode === 0 && pts.length >= 2) spawnCreatures(pts, curColor);
  if (mode === 1 && pts.length >= 2) finalizeStroke(pts, curColor);
  pts = []; lastPt = null;
});
cDraw.addEventListener('pointerleave', ev => {
  if (!drawing) return; drawing = false;
  if (currentStroke && currentStroke.pts.length > 1) { strokes.push(currentStroke); if (strokes.length > 40) strokes.shift(); }
  if (mode === 3) finalizeLightStroke();
  currentStroke = null;
  if (mode === 0 && pts.length >= 2) spawnCreatures(pts, curColor);
  pts = []; lastPt = null;
});

// ════════════════════════════════════════════════
// ① 図形キャラクター
// ════════════════════════════════════════════════
let creatures = [];

function sLen(pts) { let l = 0; for (let i = 1; i < pts.length; i++) l += Math.hypot(pts[i].x - pts[i-1].x, pts[i].y - pts[i-1].y); return l; }
function isCirc(pts) { if (pts.length < 8) return false; return Math.hypot(pts[0].x - pts[pts.length-1].x, pts[0].y - pts[pts.length-1].y) < sLen(pts) * .28; }
function curviness(pts) { let t = 0, pa = null; for (let i = 1; i < pts.length; i++) { const a = Math.atan2(pts[i].y-pts[i-1].y, pts[i].x-pts[i-1].x); if (pa !== null && Math.abs(a - pa) > .15) t++; pa = a; } return t; }

function spawnCreatures(pts, col) {
  // 線の中間点から1匹だけ生まれる
  const mid = pts[Math.floor(pts.length / 2)] || pts[0];
  const shapes = ['circle', 'triangle', 'rect'];
  creatures.push(mkCreature(shapes[Math.floor(Math.random() * 3)], mid.x, mid.y, col));
}

function mkCreature(shape, x, y, col) {
  const a = Math.random() * Math.PI * 2;
  const spd = 0.3 + Math.random() * 0.5;
  // 頂点数をランダムに変えて形の個性を出す（5〜10頂点）
  const n = 5 + Math.floor(Math.random() * 6);
  return {
    shape, x, y, col,
    vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
    angle: a, tAngle: a,
    // サイズを大きく、かつランダム幅を広げる
    size: 22 + Math.random() * 20,
    rot: Math.random() * Math.PI * 2, vrot: R(.012),
    phase: Math.random() * Math.PI * 2, wingP: 0,
    age: 0, squish: 1, squishV: 0,
    spinning: false, spinAngle: 0, spinTimer: Math.floor(Math.random() * 200),
    alpha: 1, dying: false,
    eatParticles: [],
    // blobR の振れ幅を大きくして不定形に
    blobR:  Array.from({length: n}, () => 0.50 + Math.random() * 0.88),
    blobPh: Array.from({length: n}, () => Math.random() * Math.PI * 2),
    eyeY:  -(0.16 + Math.random() * 0.22),
  };
}

// 線との距離
function ptSegDist(p, a, b) {
  const dx = b.x - a.x, dy = b.y - a.y, l2 = dx*dx + dy*dy;
  if (l2 === 0) return Math.hypot(p.x - a.x, p.y - a.y);
  const t = Math.max(0, Math.min(1, ((p.x-a.x)*dx + (p.y-a.y)*dy) / l2));
  return Math.hypot(p.x - (a.x + t*dx), p.y - (a.y + t*dy));
}

function getPosOnStroke(st, t) {
  const total = sLen(st.pts); const target = t * total; let acc = 0;
  for (let i = 1; i < st.pts.length; i++) {
    const d = Math.hypot(st.pts[i].x - st.pts[i-1].x, st.pts[i].y - st.pts[i-1].y);
    if (acc + d >= target) {
      const r = (target - acc) / d;
      return { x: st.pts[i-1].x + r*(st.pts[i].x - st.pts[i-1].x), y: st.pts[i-1].y + r*(st.pts[i].y - st.pts[i-1].y) };
    }
    acc += d;
  }
  return st.pts[st.pts.length - 1];
}

function findNearestStroke(c) {
  let best = null, bestDist = c.size * 3;
  for (const st of strokes) {
    for (let i = 1; i < st.pts.length; i++) {
      const d = ptSegDist({ x: c.x, y: c.y }, st.pts[i-1], st.pts[i]);
      if (d < bestDist) { bestDist = d; best = st; }
    }
  }
  return best;
}

function updCreatures() {
  for (const c of creatures) {
    c.age++; c.phase += .04; c.wingP += .08;

    // ぷにぷに
    c.squishV += (-c.squish + 1) * .25;
    c.squishV *= .55;
    c.squish += c.squishV;

    // 芋虫・蝶々的なゆっくりした操舵
    // ゆるやかに方向転換（小さな乱数）
    c.tAngle += R(.04);
    // たまにふわっと方向を変える
    if (Math.random() < .008) c.tAngle += R(.8);
    c.angle += (c.tAngle - c.angle) * .03;

    // 蝶々的な速度変化：sin波でふわふわ
    const spd = 0.35 + Math.sin(c.phase * .5) * 0.15;
    c.vx = Math.cos(c.angle) * spd;
    c.vy = Math.sin(c.angle) * spd;

    // 200フレームに1回くるっと1回転
    c.spinTimer++;
    if (!c.spinning && c.spinTimer >= 200) {
      c.spinning = true; c.spinAngle = 0; c.spinTimer = 0;
    }
    if (c.spinning) {
      c.spinAngle += .18;
      c.rot += .18;
      if (c.spinAngle >= Math.PI * 2) { c.spinning = false; c.spinAngle = 0; }
    } else {
      c.rot += c.vrot;
    }

    // 壁で跳ねる（ぷにぷに強調）
    if (c.x < c.size) { c.vx = Math.abs(c.vx); c.tAngle = R(.3); c.squishV = .6; }
    if (c.x > W - c.size) { c.vx = -Math.abs(c.vx); c.tAngle = Math.PI + R(.3); c.squishV = .6; }
    if (c.y < c.size) { c.vy = Math.abs(c.vy); c.squishV = .6; }
    if (c.y > H - c.size) { c.vy = -Math.abs(c.vy); c.squishV = .6; }

    c.x += c.vx; c.y += c.vy;
    // フェードアウト中
    if (c.dying) c.alpha = Math.max(0, c.alpha - .04);
  }
  // 40匹超過：古いものをフェードアウト開始
  if (creatures.length > 40) {
    const excess = creatures.length - 40;
    for (let i = 0; i < excess; i++) { if (!creatures[i].dying) creatures[i].dying = true; }
  }
  creatures = creatures.filter(c => c.alpha > 0);
}

function spawnEatParticles(c) {
  const cols = ['#FF2D78','#FF6B00','#FFE600','#00C853','#00B0FF'];
  for (let i = 0; i < 5; i++) {
    const a = Math.random() * Math.PI * 2, spd = 1.5 + Math.random() * 3;
    c.eatParticles.push({ x: c.x, y: c.y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - 1, life: 12 + Math.floor(Math.random()*8), size: 3 + Math.random()*4, col: cols[Math.floor(Math.random()*cols.length)] });
  }
}

function drawEyes(ctx, x, y, sz, col) {
  const er = sz * .30, ex = sz * .38, ey = sz * .14;
  ctx.save();
  // 目の周りに色のにじみ（輪郭なし）
  ctx.fillStyle = col;
  ctx.globalAlpha = 0.18;
  ctx.beginPath(); ctx.arc(x - ex, y - ey, er * 1.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + ex, y - ey, er * 1.4, 0, Math.PI * 2); ctx.fill();
  // 白目（輪郭なし・柔らかい楕円）
  ctx.fillStyle = '#ffffff';
  ctx.globalAlpha = 0.90;
  ctx.beginPath(); ctx.ellipse(x - ex, y - ey, er, er * 1.06, -0.12, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + ex, y - ey, er, er * 1.06,  0.12, 0, Math.PI * 2); ctx.fill();
  // 黒目（輪郭なし・深い茶寄りの黒）
  ctx.fillStyle = 'rgba(32,16,6,0.86)';
  ctx.globalAlpha = 1;
  ctx.beginPath(); ctx.arc(x - ex + er * .12, y - ey + er * .10, er * .58, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + ex + er * .12, y - ey + er * .10, er * .58, 0, Math.PI * 2); ctx.fill();
  // ハイライト 大
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(x - ex + er * .32, y - ey - er * .22, er * .22, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + ex + er * .32, y - ey - er * .22, er * .22, 0, Math.PI * 2); ctx.fill();
  // ハイライト 小
  ctx.beginPath(); ctx.arc(x - ex + er * .06, y - ey + er * .24, er * .10, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + ex + er * .06, y - ey + er * .24, er * .10, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// 不定形ブロブのパスを生成（スライム輪郭）
function mkBlobPath(ctx, c, scale, phShift) {
  const n = c.blobR.length, s = c.size;
  const pts = [];
  for (let i = 0; i < n; i++) {
    const ang = (i / n) * Math.PI * 2;
    const wobble = Math.sin(c.phase * 1.1 + c.blobPh[i] + phShift) * 0.17;
    const r = s * c.blobR[i] * scale * (1 + wobble);
    pts.push({ x: Math.cos(ang) * r, y: Math.sin(ang) * r });
  }
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const p1 = pts[i], p2 = pts[(i + 1) % n];
    const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
    if (i === 0) ctx.moveTo(mx, my);
    ctx.quadraticCurveTo(p1.x, p1.y, mx, my);
  }
  ctx.closePath();
}

function drwCreatures() {
  ctxL.clearRect(0, 0, W, H);
  for (const c of creatures) {
    const sx = c.squish, sy = 2 - c.squish;
    const s = c.size;
    const al = 0.92 * c.alpha;

    ctxL.save();
    ctxL.translate(c.x, c.y);
    ctxL.rotate(c.rot);
    ctxL.scale(sx, sy);

    // 一番外側：色にじみ（クレヨン色伸び感・黒線なし）
    ctxL.globalAlpha = 0.11 * al;
    ctxL.fillStyle = c.col;
    mkBlobPath(ctxL, c, 1.42, 0.5);
    ctxL.fill();

    // 中間層：柔らかい色の広がり
    ctxL.globalAlpha = 0.34 * al;
    ctxL.fillStyle = c.col;
    mkBlobPath(ctxL, c, 1.14, 0.15);
    ctxL.fill();

    // メイン本体（一番しっかりした色）
    ctxL.globalAlpha = 0.70 * al;
    ctxL.fillStyle = c.col;
    mkBlobPath(ctxL, c, 0.96, 0);
    ctxL.fill();

    // 内側ハイライト（白い光・クレヨンの紙の白さ）
    ctxL.globalAlpha = 0.30 * al;
    ctxL.fillStyle = '#ffffff';
    mkBlobPath(ctxL, c, 0.52, 1.3);
    ctxL.fill();

    // 目（スクワッシュを戻してから・黒線なし）
    ctxL.scale(1 / sx, 1 / sy);
    ctxL.globalAlpha = al;
    drawEyes(ctxL, 0, s * c.eyeY, s, c.col);

    ctxL.restore();
  }
}

function ctx_circle(ctx, x, y, r, lw) { ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill(); ctx.stroke(); }

// ════════════════════════════════════════════════
// ② 植物
// ════════════════════════════════════════════════
let plants = [];
const GR = ['#00C853','#64DD17','#AEEA00','#00BFA5','#1B5E20'];
// 花の種類（5種類）
const FLOWER_TYPES = ['daisy','round','tulip','pop','plum'];

function mkFlowerObj(x, y, col, size) {
  const ftype = FLOWER_TYPES[Math.floor(Math.random() * FLOWER_TYPES.length)];
  const petals = ftype === 'daisy' ? 12 + Math.floor(Math.random()*5)
               : ftype === 'pop'   ? 16 + Math.floor(Math.random()*6)
               : ftype === 'tulip' ? 3
               : ftype === 'plum'  ? 5
               : 5 + Math.floor(Math.random()*3);
  return { t:'flower', ftype, x, y, col, size, petals,
    a:0, gr:true, ph:Math.random()*Math.PI*2,
    phase:Math.random()*Math.PI*2, phSpd:.016+Math.random()*.018,
    popScale:0, popAge:0 };
}

function spawnPlantSeg(p, prev) {
  if (!prev) return;
  const dx = p.x - prev.x, dy = p.y - prev.y;
  if (Math.hypot(dx, dy) < 5) return;
  plants.push({ t: 'stem', x1: prev.x, y1: prev.y, x2: p.x, y2: p.y, col: curColor, w: 3 + Math.random()*2, a: .85, phase: 0 });
  if (Math.random() < .09) {
    const side = Math.random() < .5 ? 1 : -1;
    const ang = Math.atan2(dy, dx) + Math.PI/2*side + R(.5);
    plants.push({ t: 'leaf', x: p.x, y: p.y, ang, size: 10 + Math.random()*18, col: GR[Math.floor(Math.random()*GR.length)], a: 0, gr: true, phase: Math.random()*Math.PI*2, phSpd: .02+Math.random()*.02 });
  }
  if (Math.random() < .03)
    plants.push(mkFlowerObj(p.x, p.y, curColor, 9 + Math.random()*13));
}

function finalizeStroke(pts, col) {
  const e = pts[pts.length - 1];
  plants.push(mkFlowerObj(e.x, e.y, col, 15 + Math.random()*14));
}

function updPlants() {
  for (const p of plants) {
    if (p.gr) { p.a = Math.min(p.a + .05, .9); if (p.a >= .88) p.gr = false; }
    // 揺れ
    if (p.phase !== undefined) p.phase += p.phSpd || .02;
    // 花の出現ポップアニメ（scale 0→1.3→1.0）
    if (p.t === 'flower' && p.popScale !== undefined && p.popScale < 1) {
      p.popAge = (p.popAge || 0) + 1;
      if (p.popAge < 8) p.popScale = p.popAge / 8 * 1.3;
      else if (p.popAge < 14) p.popScale = 1.3 - (p.popAge - 8) / 6 * 0.3;
      else { p.popScale = 1; }
    }
    // フェードアウト中
    if (p.dying) p.a = Math.max(0, p.a - .025);
  }
  // 1000超過：古いものをフェードアウト開始
  if (plants.length > 1000) {
    const excess = plants.length - 1000;
    for (let i = 0; i < excess; i++) { if (!plants[i].dying) plants[i].dying = true; }
  }
  plants = plants.filter(p => p.a > 0);
}

// 花の種類別描画（黒線なし・塗り重ねのみ）
function drawFlower(ctx, p) {
  const s = p.size, n = p.petals, al = ctx.globalAlpha;

  if (p.ftype === 'daisy') {
    // ── デイジー/マーガレット：細長い花びら ──
    for (let i = 0; i < n; i++) {
      const a = (i/n)*Math.PI*2 + p.ph;
      ctx.save(); ctx.rotate(a);
      ctx.globalAlpha = al * .82; ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.ellipse(s*.66, 0, s*.20, s*.07, 0, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = al * .22; ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(s*.60, 0, s*.12, s*.04, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = al;    ctx.fillStyle = '#FFCC00'; ctx.beginPath(); ctx.arc(0,0,s*.32,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = al*.65; ctx.fillStyle = '#FF9500'; ctx.beginPath(); ctx.arc(0,0,s*.20,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = al*.45; ctx.fillStyle = '#FFF9C4'; ctx.beginPath(); ctx.arc(-s*.06,-s*.07,s*.10,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = al;

  } else if (p.ftype === 'round') {
    // ── まるい花：幅広楕円花びら ──
    ctx.globalAlpha = al * .86; ctx.fillStyle = p.col;
    for (let i = 0; i < n; i++) {
      const a = (i/n)*Math.PI*2 + p.ph;
      ctx.beginPath(); ctx.ellipse(Math.cos(a)*s*.56,Math.sin(a)*s*.56,s*.50,s*.28,a,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = al * .20; ctx.fillStyle = '#fff';
    for (let i = 0; i < n; i++) {
      const a = (i/n)*Math.PI*2 + p.ph;
      ctx.beginPath(); ctx.ellipse(Math.cos(a)*s*.56,Math.sin(a)*s*.56,s*.30,s*.15,a,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = al;    ctx.fillStyle = '#FFF176'; ctx.beginPath(); ctx.arc(0,0,s*.30,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = al*.72; ctx.fillStyle = '#FFD740'; ctx.beginPath(); ctx.arc(0,0,s*.18,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = al;

  } else if (p.ftype === 'tulip') {
    // ── チューリップ：丸い3枚花びら ──
    ctx.globalAlpha = al * .90; ctx.fillStyle = p.col;
    for (let i = 0; i < 3; i++) {
      const a = (i/3)*Math.PI*2 + p.ph - Math.PI/2;
      ctx.beginPath(); ctx.arc(Math.cos(a)*s*.38,Math.sin(a)*s*.38,s*.46,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = al * .28; ctx.fillStyle = '#fff';
    for (let i = 0; i < 3; i++) {
      const a = (i/3)*Math.PI*2 + p.ph - Math.PI/2;
      ctx.beginPath(); ctx.arc(Math.cos(a)*s*.38-s*.10,Math.sin(a)*s*.38-s*.10,s*.20,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = al;    ctx.fillStyle = '#FFD740'; ctx.beginPath(); ctx.arc(0,0,s*.24,0,Math.PI*2); ctx.fill();

  } else if (p.ftype === 'pop') {
    // ── ポンポン/マリーゴールド：小丸をたくさん ──
    ctx.fillStyle = p.col;
    for (let i = 0; i < n; i++) {
      const a = (i/n)*Math.PI*2 + p.ph;
      const rad = s * (.38 + (i%3)*.14);
      ctx.globalAlpha = al * .78;
      ctx.beginPath(); ctx.arc(Math.cos(a)*rad,Math.sin(a)*rad,s*.26,0,Math.PI*2); ctx.fill();
    }
    const nr = Math.ceil(n*.55);
    for (let i = 0; i < nr; i++) {
      const a = (i/nr)*Math.PI*2 + p.ph + Math.PI/nr;
      ctx.globalAlpha = al * .58; ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(Math.cos(a)*s*.20,Math.sin(a)*s*.20,s*.22,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = al;    ctx.fillStyle = '#FF8F00'; ctx.beginPath(); ctx.arc(0,0,s*.26,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = al*.50; ctx.fillStyle = '#FFF9C4'; ctx.beginPath(); ctx.arc(-s*.07,-s*.08,s*.11,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = al;

  } else {
    // ── 梅/桜：丸い5枚花びら ──
    ctx.globalAlpha = al * .88; ctx.fillStyle = p.col;
    for (let i = 0; i < 5; i++) {
      const a = (i/5)*Math.PI*2 + p.ph - Math.PI/2;
      ctx.beginPath(); ctx.arc(Math.cos(a)*s*.50,Math.sin(a)*s*.50,s*.42,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = al * .26; ctx.fillStyle = '#fff';
    for (let i = 0; i < 5; i++) {
      const a = (i/5)*Math.PI*2 + p.ph - Math.PI/2;
      ctx.beginPath(); ctx.arc(Math.cos(a)*s*.50-s*.10,Math.sin(a)*s*.50-s*.10,s*.18,0,Math.PI*2); ctx.fill();
    }
    // おしべ
    ctx.globalAlpha = al; ctx.fillStyle = '#FFD740';
    for (let i = 0; i < 7; i++) {
      const a = (i/7)*Math.PI*2;
      ctx.beginPath(); ctx.arc(Math.cos(a)*s*.22,Math.sin(a)*s*.22,s*.06,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#FFCC00'; ctx.beginPath(); ctx.arc(0,0,s*.13,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = al;
  }
}

function drwPlants() {
  ctxL.clearRect(0, 0, W, H);
  for (const p of plants) {
    ctxL.save(); ctxL.globalAlpha = p.a;
    if (p.t === 'stem') {
      ctxL.strokeStyle = p.col; ctxL.lineWidth = p.w; ctxL.lineCap = 'round';
      ctxL.beginPath(); ctxL.moveTo(p.x1,p.y1); ctxL.lineTo(p.x2,p.y2); ctxL.stroke();
    } else if (p.t === 'leaf') {
      const wob = Math.sin(p.phase||0) * .2;
      ctxL.translate(p.x, p.y); ctxL.rotate(p.ang + wob);
      // 葉（塗り・黒線なし）
      ctxL.fillStyle = p.col;
      ctxL.beginPath(); ctxL.moveTo(0,0); ctxL.quadraticCurveTo(p.size*.5,-p.size*.42,p.size,0); ctxL.quadraticCurveTo(p.size*.5,p.size*.42,0,0); ctxL.fill();
      // 葉脈（白い薄い楕円）
      ctxL.globalAlpha = p.a * .20; ctxL.fillStyle = '#fff';
      ctxL.beginPath(); ctxL.ellipse(p.size*.45,0,p.size*.36,p.size*.055,0,0,Math.PI*2); ctxL.fill();
    } else if (p.t === 'flower') {
      const wob = Math.sin(p.phase||0) * .07;
      const sc = (p.popScale < 1 ? p.popScale : 1) * (1 + Math.sin((p.phase||0)*.7)*.04);
      ctxL.translate(p.x, p.y); ctxL.rotate(wob); ctxL.scale(sc, sc);
      drawFlower(ctxL, p);
    }
    ctxL.restore();
  }
}

// ════════════════════════════════════════════════
// ③ 音
// ════════════════════════════════════════════════
let soundWaves = [], audioCtx = null;

function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), l = (max+min)/2;
  let h = 0, s = 0;
  if (max !== min) { const d = max-min; s = l>.5 ? d/(2-max-min) : d/(max+min); h = max===r ? (g-b)/d+(g<b?6:0) : max===g ? (b-r)/d+2 : (r-g)/d+4; h /= 6; }
  return [h*360, s*100, l*100];
}
function complementColor(hex) {
  if (!hex || hex.length < 7) return '#ffffff';
  try {
    let [h, s, l] = hexToHsl(hex);
    h = (h + 180) % 360;
    // HSL→hex
    s /= 100; l /= 100;
    const k = n => (n + h/30) % 12;
    const a = s * Math.min(l, 1-l);
    const f = n => l - a * Math.max(-1, Math.min(k(n)-3, Math.min(9-k(n), 1)));
    const toHex = x => Math.round(x*255).toString(16).padStart(2,'0');
    return '#' + toHex(f(0)) + toHex(f(8)) + toHex(f(4));
  } catch(e) { return '#ffffff'; }
}

function spawnSoundWave(p) {
  const sp = lastPt ? Math.hypot(p.x - lastPt.x, p.y - lastPt.y) : 5;
  const freq = 200 + sp * 18;
  soundWaves.push({ x: p.x, y: p.y, r: 0, freq, col: curColor, compCol: complementColor(curColor), a: .7 });
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx && sp > 4) {
    try {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value = Math.min(freq, 1200);
      g.gain.setValueAtTime(.07, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + .25);
      o.start(); o.stop(audioCtx.currentTime + .25);
    } catch(e) {}
  }
}

function updWaves() {
  for (const w of soundWaves) { w.r += 2.5 + w.freq / 200; w.a *= .87; }
  soundWaves = soundWaves.filter(w => w.a > .015);
}

function drwWaves() {
  ctxL.clearRect(0, 0, W, H);
  for (const w of soundWaves) {
    ctxL.save();
    // 外側の波紋（描いた色）
    ctxL.globalAlpha = w.a; ctxL.strokeStyle = w.col; ctxL.lineWidth = 2;
    ctxL.beginPath(); ctxL.arc(w.x, w.y, w.r, 0, Math.PI*2); ctxL.stroke();
    // 内側の波紋（補色）
    if (w.r > 15) {
      ctxL.globalAlpha = w.a * .55; ctxL.strokeStyle = w.compCol; ctxL.lineWidth = 1.5;
      ctxL.beginPath(); ctxL.arc(w.x, w.y, w.r * .55, 0, Math.PI*2); ctxL.stroke();
    }
    // フェードアウト時に中心に光の点を残す
    if (w.a < .18) {
      const dotAlpha = (w.a / .18) * .9;
      const dotR = 3 * (w.a / .18);
      ctxL.globalAlpha = dotAlpha;
      const grd = ctxL.createRadialGradient(w.x, w.y, 0, w.x, w.y, dotR * 2.5);
      grd.addColorStop(0, '#ffffff');
      grd.addColorStop(.5, w.col);
      grd.addColorStop(1, 'transparent');
      ctxL.fillStyle = grd;
      ctxL.beginPath(); ctxL.arc(w.x, w.y, dotR * 2.5, 0, Math.PI*2); ctxL.fill();
    }
    ctxL.restore();
  }
}


// ── 描画フェードアウト ──────────────────────────
// 毎フレーム微量ずつ c-draw を透明にしていく（約2〜3分で消える）
function fadeDraw() {
  ctxD.save();
  ctxD.globalCompositeOperation = 'destination-out';
  ctxD.globalAlpha = 0.0006;
  ctxD.fillStyle = '#000';
  ctxD.fillRect(0, 0, W, H);
  ctxD.restore();
}

// ── ギャラリー ─────────────────────────────────
const GALLERY_KEY = 'kakikaki_gallery';

function saveSnapshot() {
  // 800×450 に縮小して JPEG 保存（容量節約）
  const SW = 800, SH = 450;
  const tmp = document.createElement('canvas');
  tmp.width = SW; tmp.height = SH;
  const tc = tmp.getContext('2d');
  tc.fillStyle = '#fff';
  tc.fillRect(0, 0, SW, SH);
  tc.drawImage(cBg,   0, 0, SW, SH);
  tc.drawImage(cDraw, 0, 0, SW, SH);
  tc.drawImage(cLife, 0, 0, SW, SH);
  const dataUrl = tmp.toDataURL('image/jpeg', 0.72);

  const now = new Date();
  const label =
    `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ` +
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  let gallery = loadGallery();
  gallery.push({ id: now.getTime(), dataUrl, label });

  try {
    localStorage.setItem(GALLERY_KEY, JSON.stringify(gallery));
    showSaveFeedback();
  } catch(e) {
    // ストレージ容量超過：エラーを通知（既存データは削除しない）
    const toast = document.getElementById('save-toast');
    const orig = toast.textContent;
    toast.textContent = 'ストレージが満杯です';
    toast.classList.add('on');
    setTimeout(() => {
      toast.classList.remove('on');
      setTimeout(() => { toast.textContent = orig; }, 300);
    }, 2500);
  }
}

function showSaveFeedback() {
  const flash = document.getElementById('save-flash');
  const toast = document.getElementById('save-toast');
  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 180);
  toast.classList.add('on');
  setTimeout(() => toast.classList.remove('on'), 1800);
}

function loadGallery() {
  try { return JSON.parse(localStorage.getItem(GALLERY_KEY) || '[]'); }
  catch(e) { return []; }
}

function deleteGalleryItem(id) {
  let gallery = loadGallery();
  gallery = gallery.filter(g => g.id !== id);
  localStorage.setItem(GALLERY_KEY, JSON.stringify(gallery));
}

let currentViewId = null;

function renderGallery() {
  const gallery = loadGallery();
  const grid  = document.getElementById('gallery-grid');
  const empty = document.getElementById('gallery-empty');
  grid.innerHTML = '';

  if (gallery.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  // 新しい順に並べる
  [...gallery].reverse().forEach(item => {
    const card = document.createElement('div');
    card.className = 'g-card';

    const img = document.createElement('img');
    img.src = item.dataUrl;
    img.loading = 'lazy';
    img.draggable = false;

    const lbl = document.createElement('div');
    lbl.className = 'g-label';
    lbl.textContent = item.label;

    const del = document.createElement('button');
    del.className = 'g-del';
    del.textContent = '×';
    del.addEventListener('pointerdown', ev => {
      ev.stopPropagation();
      deleteGalleryItem(item.id);
      card.style.transition = 'opacity .28s,transform .28s';
      card.style.opacity = '0';
      card.style.transform = 'scale(.88)';
      setTimeout(() => {
        card.remove();
        if (grid.querySelectorAll('.g-card').length === 0) empty.style.display = 'block';
      }, 300);
    });

    card.addEventListener('click', () => openItem(item));
    card.appendChild(img);
    card.appendChild(lbl);
    card.appendChild(del);
    grid.appendChild(card);
  });
}

function openGallery() {
  renderGallery();
  document.getElementById('gallery-overlay').classList.add('open');
}
function closeGallery() {
  document.getElementById('gallery-overlay').classList.remove('open');
}

function openItem(item) {
  currentViewId = item.id;
  document.getElementById('item-img').src = item.dataUrl;
  document.getElementById('item-label').textContent = item.label;
  document.getElementById('item-viewer').classList.add('open');
}
function closeItem() {
  document.getElementById('item-viewer').classList.remove('open');
  currentViewId = null;
}

// ボタンイベント
document.getElementById('btn-save').addEventListener('pointerdown', ev => {
  ev.stopPropagation();
  saveSnapshot();
});
document.getElementById('btn-gallery').addEventListener('pointerdown', ev => {
  ev.stopPropagation();
  openGallery();
});

// 全画面ボタン
const btnFs = document.getElementById('btn-fullscreen');
btnFs.addEventListener('pointerdown', ev => {
  ev.stopPropagation();
  const el = document.documentElement;
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (req) req.call(el).catch(() => {});
  } else {
    const ex = document.exitFullscreen || document.webkitExitFullscreen;
    if (ex) ex.call(document).catch(() => {});
  }
});
// 全画面切り替え時にアイコンを更新
function onFsChange() {
  const isFull = !!(document.fullscreenElement || document.webkitFullscreenElement);
  document.getElementById('fs-icon-expand').style.display   = isFull ? 'none' : '';
  document.getElementById('fs-icon-compress').style.display = isFull ? '' : 'none';
  setTimeout(resize, 200);
}
document.addEventListener('fullscreenchange',       onFsChange);
document.addEventListener('webkitfullscreenchange', onFsChange);

document.getElementById('gallery-close').addEventListener('click', closeGallery);
document.getElementById('item-close-btn').addEventListener('click', closeItem);
document.getElementById('item-del-btn').addEventListener('click', () => {
  if (currentViewId !== null) {
    deleteGalleryItem(currentViewId);
    closeItem();
    renderGallery();
  }
});
// ビューアの背景クリックで閉じる
document.getElementById('item-viewer').addEventListener('click', ev => {
  if (ev.target === document.getElementById('item-viewer')) closeItem();
});
// ESC キー対応
document.addEventListener('keydown', ev => {
  if (ev.key === 'Escape') {
    if (document.getElementById('item-viewer').classList.contains('open')) closeItem();
    else if (document.getElementById('gallery-overlay').classList.contains('open')) closeGallery();
  }
});

// ── メインループ ───────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  fadeDraw(); // 常時：描画を自然フェード
  switch (mode) {
    case 0: updCreatures(); drwCreatures(); break;
    case 1: updPlants();    drwPlants();    break;
    case 2: updWaves();     drwWaves();     break;
    case 3: updLightTrails(); drwLightTrails(); break;
  }
}
loop();

// ════════════════════════════════════════════════
// ④ 光の軌跡モード
// ════════════════════════════════════════════════

// 選択色 hex → 色相(0-360)
function hexToHue(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max-min;
  if (d === 0) return 0;
  let h = 0;
  if (max === r) h = ((g-b)/d+6)%6;
  else if (max === g) h = (b-r)/d+2;
  else h = (r-g)/d+4;
  return h * 60;
}

// なぞり中のパーティクル（一時的・消える）
let lightTrails = [];
// 永続する線データ（モード離脱時に c-draw へ焼き付け）
let lightStrokes = []; // [{ pts:[{x,y,hue}], baseHue }]
let lightHueShift = 0; // なぞり中の色相シフト量

function spawnLightTrail(cur, prev) {
  const baseHue = hexToHue(curColor);
  lightHueShift = (lightHueShift + 3.5) % 360;
  // 選択色の色相を中心に ±40度の範囲で揺らぐ
  const hue = (baseHue + Math.sin(lightHueShift * 0.08) * 40 + 360) % 360;

  const dist = Math.hypot(cur.x-prev.x, cur.y-prev.y);
  const steps = Math.max(1, Math.floor(dist / 3));

  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const x = prev.x + (cur.x-prev.x)*t;
    const y = prev.y + (cur.y-prev.y)*t;
    const h = (hue + i * 2) % 360;

    // コア光点
    lightTrails.push({
      x, y, hue: h,
      r: 4 + Math.random() * 3,
      life: 1.0,
      decay: 0.010 + Math.random() * 0.007,
      vx: (Math.random()-0.5) * 0.35,
      vy: (Math.random()-0.5) * 0.35,
      type: 'core'
    });
    // 散るスパーク
    if (Math.random() < 0.5) {
      const a = Math.random() * Math.PI * 2;
      const spd = 0.6 + Math.random() * 1.4;
      lightTrails.push({
        x: x + (Math.random()-0.5)*5, y: y + (Math.random()-0.5)*5,
        hue: (h + 25 + Math.random()*30) % 360,
        r: 1.5 + Math.random() * 2,
        life: 0.65 + Math.random() * 0.35,
        decay: 0.020 + Math.random() * 0.012,
        vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
        type: 'spark'
      });
    }
  }

  // currentStroke に色相情報付きで記録
  if (currentStroke) {
    if (!currentStroke.hueSegs) currentStroke.hueSegs = [];
    currentStroke.hueSegs.push({ x: cur.x, y: cur.y, hue });
  }
}

// ストローク開始時に hueSegs 初期化
function initLightStroke(p) {
  const baseHue = hexToHue(curColor);
  if (currentStroke) currentStroke.hueSegs = [{ x: p.x, y: p.y, hue: baseHue }];
}

// ストローク完了時に lightStrokes へ保存
function finalizeLightStroke() {
  if (currentStroke && currentStroke.hueSegs && currentStroke.hueSegs.length > 1) {
    lightStrokes.push({
      segs: currentStroke.hueSegs,
      baseHue: hexToHue(curColor)
    });
  }
}

// モード離脱時に lightStrokes を c-draw へ焼き付ける
function bakeLightStrokes() {
  if (lightStrokes.length === 0) return;
  ctxD.save();
  ctxD.globalCompositeOperation = 'source-over';
  for (const stroke of lightStrokes) {
    const segs = stroke.segs;
    if (segs.length < 2) continue;
    // 線本体：色相変化するグラデーション線
    for (let i = 1; i < segs.length; i++) {
      const a = segs[i-1], b = segs[i];
      const grad = ctxD.createLinearGradient(a.x, a.y, b.x, b.y);
      grad.addColorStop(0, `hsla(${a.hue},100%,62%,0.82)`);
      grad.addColorStop(1, `hsla(${b.hue},100%,62%,0.82)`);
      ctxD.strokeStyle = grad;
      ctxD.lineWidth = 5 + Math.random() * 3;
      ctxD.lineCap = 'round';
      ctxD.lineJoin = 'round';
      ctxD.beginPath();
      ctxD.moveTo(a.x, a.y);
      ctxD.lineTo(b.x, b.y);
      ctxD.stroke();
      // 外側グロー層
      const glow = ctxD.createLinearGradient(a.x, a.y, b.x, b.y);
      glow.addColorStop(0, `hsla(${a.hue},100%,80%,0.18)`);
      glow.addColorStop(1, `hsla(${b.hue},100%,80%,0.18)`);
      ctxD.strokeStyle = glow;
      ctxD.lineWidth = 18 + Math.random() * 6;
      ctxD.beginPath();
      ctxD.moveTo(a.x, a.y);
      ctxD.lineTo(b.x, b.y);
      ctxD.stroke();
    }
  }
  ctxD.restore();
  lightStrokes = [];
}

function updLightTrails() {
  for (const p of lightTrails) {
    p.life -= p.decay;
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
  }
  lightTrails = lightTrails.filter(p => p.life > 0);
}

function drwLightTrails() {
  ctxL.clearRect(0, 0, W, H);
  for (const p of lightTrails) {
    const a = p.life;
    ctxL.save();
    ctxL.globalCompositeOperation = 'lighter';
    if (p.type === 'core') {
      const grd = ctxL.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 5);
      grd.addColorStop(0,    `hsla(${p.hue},100%,98%,${a*0.88})`);
      grd.addColorStop(0.22, `hsla(${p.hue},100%,78%,${a*0.55})`);
      grd.addColorStop(0.6,  `hsla(${p.hue},100%,55%,${a*0.22})`);
      grd.addColorStop(1,    `hsla(${p.hue},100%,40%,0)`);
      ctxL.fillStyle = grd;
      ctxL.beginPath(); ctxL.arc(p.x, p.y, p.r*5, 0, Math.PI*2); ctxL.fill();
      ctxL.globalAlpha = a * 0.92;
      ctxL.fillStyle = `hsl(${p.hue},60%,97%)`;
      ctxL.beginPath(); ctxL.arc(p.x, p.y, p.r*0.65, 0, Math.PI*2); ctxL.fill();
    } else {
      const grd = ctxL.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r*3.5);
      grd.addColorStop(0,   `hsla(${p.hue},100%,95%,${a*0.75})`);
      grd.addColorStop(0.4, `hsla(${p.hue},100%,65%,${a*0.38})`);
      grd.addColorStop(1,   `hsla(${p.hue},100%,45%,0)`);
      ctxL.fillStyle = grd;
      ctxL.beginPath(); ctxL.arc(p.x, p.y, p.r*3.5, 0, Math.PI*2); ctxL.fill();
    }
    ctxL.restore();
  }
}
